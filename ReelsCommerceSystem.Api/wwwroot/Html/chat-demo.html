<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Chat Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --danger: #ef4444;
            --success: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- Login Overlay --- */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.3s ease;
        }

        .login-card {
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: 1.5rem;
            border: 1px solid var(--glass-border);
            width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .login-card h1 {
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            font-size: 0.875rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.03);
            color: white;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.75rem;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 320px;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            background: rgba(30, 41, 59, 0.5);
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-list {
            flex: 1;
            overflow-y: auto;
        }

        .room-item {
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .room-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .room-item.active {
            background: rgba(99, 102, 241, 0.15);
            border-left: 4px solid var(--primary);
        }

        .room-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .room-info {
            flex: 1;
            overflow: hidden;
        }

        .room-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unread-badge {
            background: var(--primary);
            color: white;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .delete-room-btn {
            opacity: 0;
            transition: opacity 0.2s;
            color: var(--text-dim);
        }

        .room-item:hover .delete-room-btn {
            opacity: 1;
        }

        /* --- Main Chat --- */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
        }

        #empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: var(--text-dim);
        }

        .chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        #message-list {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: calc(100vh - 160px); /* Adjust based on header/input heights */
        }

        .message-bubble {
            max-width: 70%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            position: relative;
            animation: slideIn 0.2s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-sent {
            align-self: flex-end;
            background: var(--primary);
            border-bottom-right-radius: 0.25rem;
        }

        .message-received {
            align-self: flex-start;
            background: var(--bg-card);
            border-bottom-left-radius: 0.25rem;
            border: 1px solid var(--glass-border);
        }

        .message-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.25rem;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .status-icon {
            width: 14px;
            height: 14px;
        }

        .chat-input-area {
            padding: 1.5rem;
            background: rgba(30, 41, 59, 0.5);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 1rem;
        }

        /* --- Utilities --- */
        .hidden { display: none !important; }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h1>Chat Demo</h1>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="email@example.com" value="admin@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••" value="Admin@123">
            </div>
            <button class="btn" onclick="handleLogin()">Sign In</button>
            <p id="login-error" style="color: var(--danger); margin-top: 1rem; font-size: 0.875rem;"></p>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <div>
                <h3>Messages</h3>
                <div id="current-user-id" style="font-size: 0.7rem; color: var(--text-dim); margin-top: 4px;">ID: Loading...</div>
            </div>
            <div style="display: flex; gap: 0.5rem;">
                <button class="btn" style="width: auto; padding: 0.5rem;" title="Start New Chat" onclick="startNewChat()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"></path></svg>
                </button>
                <button class="btn" style="width: auto; padding: 0.5rem 1rem;" onclick="logout()">Logout</button>
            </div>
        </div>
        <div id="room-list" class="room-list">
            <!-- Rooms will appear here -->
        </div>
    </div>

    <div class="main-chat">
        <div id="empty-state">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            <p style="margin-top: 1rem;">Select a room to start chatting</p>
        </div>

        <div id="chat-content" class="hidden" style="flex: 1; display: flex; flex-direction: column;">
            <div class="chat-header">
                <div class="room-avatar" id="active-room-avatar">?</div>
                <div class="room-info">
                    <div class="room-name" id="active-room-name">Room Name</div>
                    <div id="active-room-status" style="font-size: 0.8rem; color: var(--text-dim);">Online</div>
                </div>
                <button class="btn" style="width: auto; background: var(--danger); padding: 0.5rem 1rem;" onclick="deleteActiveRoom()">Delete Room</button>
            </div>

            <div id="message-list">
                <!-- Messages will appear here -->
            </div>

            <div class="chat-input-area">
                <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendMessage()">
                <button class="btn" style="width: auto; padding: 0.5rem 1.5rem;" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // --- Configuration & State ---
        const API_BASE = window.location.origin; // Assume same origin
        const HUB_URL = `${API_BASE}/chatHub`;
        const ENCRYPTION_KEY = "rkejwhiuh@CsZbdfjs78fu!qw8uiqehfuih5";
        
        let token = localStorage.getItem("chat_token");
        let activeRoomId = null; // This will store the ENCRYPTED ID for API calls
        let activeRoomIdPlain = null; // This will store the DECRYPTED ID for comparisons
        let currentUserId = null;
        let connection = null;
        let rooms = [];
        let refreshInterval = null;

        // --- Encryption Helper (matching C#) ---
        async function getKey() {
            const enc = new TextEncoder();
            const keyData = enc.encode(ENCRYPTION_KEY.padEnd(32).substring(0, 32));
            return await crypto.subtle.importKey("raw", keyData, "AES-CBC", false, ["encrypt", "decrypt"]);
        }

        async function encrypt(plainText) {
            if (!plainText) return plainText;
            const enc = new TextEncoder();
            const key = await getKey();
            const iv = crypto.getRandomValues(new Uint8Array(16));
            const encrypted = await crypto.subtle.encrypt({ name: "AES-CBC", iv }, key, enc.encode(plainText));
            
            const combined = new Uint8Array(iv.length + encrypted.byteLength);
            combined.set(iv);
            combined.set(new Uint8Array(encrypted), iv.length);
            
            return btoa(String.fromCharCode(...combined));
        }

        async function decrypt(cipherText) {
            if (!cipherText) return cipherText;
            try {
                const combined = Uint8Array.from(atob(cipherText), c => c.charCodeAt(0));
                const iv = combined.slice(0, 16);
                const data = combined.slice(16);
                const key = await getKey();
                const decrypted = await crypto.subtle.decrypt({ name: "AES-CBC", iv }, key, data);
                return new TextDecoder().decode(decrypted);
            } catch (e) {
                console.warn("Decryption failed, returning original text", e);
                return cipherText;
            }
        }

        // --- JWT Helper ---
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                return null;
            }
        }

        function updateUserIdDisplay() {
            if (!token) return;
            const payload = parseJwt(token);
            const userId = payload?.["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/nameidentifier"] || payload?.sub || "Unknown";
            document.getElementById("current-user-id").innerText = `ID: ${userId}`;
        }

        // --- Authentication ---
        async function handleLogin() {
            const email = document.getElementById("login-email").value;
            const password = document.getElementById("login-password").value;
            const errorEl = document.getElementById("login-error");

            try {
                const response = await fetch(`${API_BASE}/api/Auth/Login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();
                if (response.ok) {
                    token = result.data.token;
                    localStorage.setItem("chat_token", token);
                    initApp();
                } else {
                    errorEl.innerText = result.message || "Login failed";
                }
            } catch (e) {
                errorEl.innerText = "Connection error. Make sure backend is running.";
            }
        }

        function logout() {
            localStorage.removeItem("chat_token");
            location.reload();
        }

        // --- App Initialization ---
        async function initApp() {
            if (!token) {
                document.getElementById("login-overlay").style.display = "flex";
                return;
            }

            document.getElementById("login-overlay").style.display = "none";
            
            // Extract user ID from token
            const payload = parseJwt(token);
            currentUserId = payload?.["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/nameidentifier"] || payload?.sub;
            
            updateUserIdDisplay();
            await setupSignalR();
            await fetchRooms();
        }

        // --- SignalR Logic ---
        async function setupSignalR() {
            connection = new signalR.HubConnectionBuilder()
                .withUrl(HUB_URL, {
                    accessTokenFactory: () => token
                })
                .withAutomaticReconnect()
                .build();

            // Register Events
            connection.on("OnReceiveMessage", async (encryptedMsg) => {
                const msg = typeof encryptedMsg === 'string' ? JSON.parse(await decrypt(encryptedMsg)) : encryptedMsg;
                handleIncomingMessage(msg);
            });

            connection.on("OnMessageSeen", (messageIds) => {
                if (Array.isArray(messageIds)) {
                    messageIds.forEach(id => updateMessageStatusLocally(id, 3)); // 3 = Seen
                } else {
                    updateMessageStatusLocally(messageIds, 3);
                }
            });

            connection.on("OnMessageDelivered", (messageIds) => {
                if (Array.isArray(messageIds)) {
                    messageIds.forEach(id => updateMessageStatusLocally(id, 2)); // 2 = Delivered
                } else {
                    updateMessageStatusLocally(messageIds, 2);
                }
            });

            connection.on("OnRoomCreated", async (room) => {
                console.log("OnRoomCreated event received, refreshing room list...", room);
                await fetchRooms();
            });

            connection.on("OnMessageDeleted", (plainId) => {
                if (plainId === "ALL") {
                    fetchMessages();
                } else {
                    const el = document.querySelector(`[data-plain-id="${plainId}"]`);
                    if (el) el.remove();
                }
            });

            connection.on("OnRoomDeleted", (plainRoomId) => {
                console.log("OnRoomDeleted received:", plainRoomId);
                // Remove the room from the local list
                rooms = rooms.filter(r => (r.plainId || r.id) != plainRoomId);
                renderRooms();
                
                // If the active room was deleted, go back to empty state
                if (activeRoomIdPlain == plainRoomId) {
                    activeRoomId = null;
                    activeRoomIdPlain = null;
                    document.getElementById("chat-content").classList.add("hidden");
                    document.getElementById("empty-state").classList.remove("hidden");
                }
            });

            try {
                await connection.start();
                console.log("SignalR Connected");
                await connection.invoke("JoinPersonalGroup");
            } catch (err) {
                console.error("SignalR Connection Error: ", err);
            }
        }

        // --- Room Management ---
        async function fetchRooms() {
            try {
                const response = await fetch(`${API_BASE}/api/chat/rooms`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();
                if (response.ok) {
                    // Handle both wrapped (result.data) and unwrapped (result) responses
                    const rawRooms = (result && result.data) ? result.data : (Array.isArray(result) ? result : []);
                    
                    // Normalize rooms with plain IDs
                    rooms = [];
                    for(const r of rawRooms) {
                        const encId = r.roomIdEnc || r.idEncr;
                        r.plainId = await decrypt(encId);
                        rooms.push(r);
                    }
                    
                    renderRooms();
                }
            } catch (e) {
                console.error("Failed to fetch rooms", e);
            }
        }

        function renderRooms() {
            const list = document.getElementById("room-list");
            list.innerHTML = "";
            if (!Array.isArray(rooms)) return; 
            
            rooms.forEach(room => {
                const id = room.roomIdEnc || room.idEncr;
                const name = room.userName || room.otherUserName;
                
                const div = document.createElement("div");
                div.className = `room-item ${activeRoomId === id ? 'active' : ''}`;
                div.onclick = () => selectRoom(room);
                
                div.innerHTML = `
                    <div class="room-avatar">${name?.[0]?.toUpperCase() || '?'}</div>
                    <div class="room-info">
                        <div class="room-name">${name}</div>
                        <div style="font-size: 0.75rem; color: var(--text-dim)">${room.lastMessage || 'No messages yet'}</div>
                    </div>
                    ${room.unreadCount > 0 ? `<div class="unread-badge" id="unread-${id}">${room.unreadCount}</div>` : ''}
                    <div class="delete-room-btn" onclick="event.stopPropagation(); deleteRoom('${id}')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        async function startNewChat() {
            const userId = prompt("Enter User ID to start chat with:");
            if (!userId) return;

            try {
                const response = await fetch(`${API_BASE}/api/chat/room/test?userId=${userId}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();
                if (response.ok) {
                    const roomIdEnc = (result && result.data) ? result.data : result;
                    await fetchRooms();
                    const newRoom = rooms.find(r => (r.roomIdEnc || r.idEncr) === roomIdEnc);
                    if (newRoom) selectRoom(newRoom);
                } else {
                    alert(result.message || "Failed to create room");
                }
            } catch (e) {
                console.error("Failed to start chat", e);
            }
        }

        async function selectRoom(room) {
            activeRoomId = room.roomIdEnc || room.idEncr;
            activeRoomIdPlain = await decrypt(activeRoomId);
            const name = room.userName || room.otherUserName;

            document.getElementById("empty-state").classList.add("hidden");
            document.getElementById("chat-content").classList.remove("hidden");
            
            document.getElementById("active-room-name").innerText = name;
            document.getElementById("active-room-avatar").innerText = name?.[0]?.toUpperCase() || '?';
            
            renderRooms(); 
            
            if (connection && connection.state === signalR.HubConnectionState.Connected) {
                await connection.invoke("JoinRoom", activeRoomId);
            }
            
            await fetchMessages();
            markRoomAsRead();
        }

        async function deleteRoom(idEnc) {
            if (!confirm("Are you sure you want to delete this room?")) return;
            try {
                const response = await fetch(`${API_BASE}/api/chat/room/${encodeURIComponent(idEnc)}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok || response.status === 204) {
                    if (activeRoomId === idEnc) {
                        activeRoomId = null;
                        document.getElementById("chat-content").classList.add("hidden");
                        document.getElementById("empty-state").classList.remove("hidden");
                    }
                    await fetchRooms();
                }
            } catch (e) {
                console.error("Failed to delete room", e);
            }
        }

        async function deleteActiveRoom() {
            if (activeRoomId) await deleteRoom(activeRoomId);
        }

        // --- Message Management ---
        async function fetchMessages() {
            try {
                const response = await fetch(`${API_BASE}/api/chat/rooms/${encodeURIComponent(activeRoomId)}/messages`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();
                if (response.ok) {
                    // Handle both direct arrays and paginated responses (result.data.data)
                    let messages = [];
                    if (result && result.data) {
                        if (Array.isArray(result.data)) {
                            messages = result.data;
                        } else if (result.data.data && Array.isArray(result.data.data)) {
                            messages = result.data.data;
                        }
                    } else if (Array.isArray(result)) {
                        messages = result;
                    }

                    // Reverse messages because API returns Descending (newest first)
                    messages.reverse();

                    const list = document.getElementById("message-list");
                    list.innerHTML = "";
                    for (const msg of messages) {
                        await appendMessage(msg);
                    }
                    list.scrollTop = list.scrollHeight;

                    // Identify messages that are not seen and notify server
                    const unreadIds = messages
                        .filter(m => m.status !== "Seen" && m.status !== 3)
                        .map(m => m.messageIdEncr || m.idEncr);
                    
                    if (unreadIds.length > 0) {
                        markMessagesAsSeenLocally(unreadIds);
                    }
                }
            } catch (e) {
                console.error("Failed to fetch messages", e);
            }
        }

        async function markMessagesAsSeenLocally(ids) {
            if (!ids || ids.length === 0) return;
            try {
                await fetch(`${API_BASE}/api/chat/status`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        roomId: activeRoomId,
                        status: "Seen",
                        messageIdsEncrypted: ids
                    })
                });
            } catch(e) {}
        }

        const processedMessageIds = new Set();

        async function appendMessage(msg) {
            const list = document.getElementById("message-list");
            
            const idEnc = msg.messageIdEncr || msg.idEncr || msg.id;
            const plainMsgId = await decrypt(idEnc);

            // Strict duplicate prevention for race conditions
            if (processedMessageIds.has(plainMsgId)) return;
            if (document.querySelector(`[data-plain-id="${plainMsgId}"]`)) {
                processedMessageIds.add(plainMsgId);
                return;
            }
            processedMessageIds.add(plainMsgId);

            const contentEnc = msg.textEncr || msg.content || msg.text || msg.textEncr;
            const status = msg.status;
            const time = msg.createdAt || msg.sentAt || new Date();
            
            const senderIdEnc = msg.senderIdEncr || msg.senderId;
            const senderId = await decrypt(senderIdEnc);
            const isMe = (senderId === currentUserId);

            const div = document.createElement("div");
            div.className = `message-bubble ${isMe ? 'message-sent' : 'message-received'}`;
            div.id = `msg-${idEnc}`;
            div.setAttribute("data-plain-id", plainMsgId);
            
            const decodedContent = await decrypt(contentEnc);
            
            div.innerHTML = `
                <div class="message-text">${decodedContent}</div>
                <div class="message-footer">
                    <span>${new Date(time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                    ${isMe ? `<span class="status-icon" id="status-${idEnc}">${getStatusIcon(status)}</span>` : ''}
                    ${isMe ? `<span style="cursor:pointer; margin-left: 5px; color:rgba(255,255,255,0.5);" onclick="deleteMessage('${idEnc}')" title="Delete message">×</span>` : ''}
                </div>
            `;
            list.appendChild(div);
            list.scrollTop = list.scrollHeight;
        }

        function getStatusIcon(status) {
            // 1: Sent, 2: Delivered, 3: Seen
            if (status === 3 || status === "Seen" || status === "Read") 
                return '<span style="color: #60a5fa;">✔✔</span>'; // Light blue for Read
            if (status === 2 || status === "Delivered") 
                return '✔✔';
            return '✔';
        }

        async function sendMessage() {
            const input = document.getElementById("msg-input");
            const text = input.value.trim();
            if (!text || !activeRoomId) return;

            const encryptedText = await encrypt(text);
            const dto = {
                roomIdEncr: activeRoomId,
                textEncr: encryptedText
            };

            try {
                const response = await fetch(`${API_BASE}/api/chat/message`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(dto)
                });
                
                if (response.ok) {
                    input.value = "";
                }
            } catch (e) {
                console.error("Failed to send message", e);
            }
        }

        async function deleteMessage(idEnc) {
            try {
                const response = await fetch(`${API_BASE}/api/chat/message/${encodeURIComponent(idEnc)}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    document.getElementById(`msg-${idEnc}`)?.remove();
                }
            } catch (e) {
                console.error("Failed to delete message", e);
            }
        }

        async function handleIncomingMessage(msg) {
            const roomIdEnc = msg.roomIdEncr || msg.roomIdEnc;
            const roomIdPlain = await decrypt(roomIdEnc);
            const actualId = msg.messageIdEncr || msg.idEncr;

            if (roomIdPlain === activeRoomIdPlain) {
                await appendMessage(msg);
                if (actualId) markMessageAsSeen(actualId, roomIdEnc);
            } else {
                if (actualId) markMessageAsDelivered(actualId, roomIdEnc);
                
                // Find the room by plain ID
                const room = rooms.find(r => r.plainId === roomIdPlain);
                if (room) {
                    const idEnc = room.roomIdEnc || room.idEncr;
                    const badge = document.getElementById(`unread-${idEnc}`);
                    if (badge) {
                        badge.innerText = parseInt(badge.innerText || "0") + 1;
                        badge.classList.remove("hidden");
                    } else {
                        fetchRooms();
                    }
                } else {
                    fetchRooms();
                }
            }
        }

        function updateMessageStatusLocally(plainId, status) {
            const el = document.querySelector(`[data-plain-id="${plainId}"] .status-icon`);
            if (el) el.innerHTML = getStatusIcon(status);
        }

        let statusQueue = [];
        let statusTimer = null;

        async function queueStatusUpdate(idEnc, roomIdEnc, status) {
            statusQueue.push({ idEnc, roomIdEnc, status });
            if (!statusTimer) {
                statusTimer = setTimeout(processStatusQueue, 500); // Batch every 500ms
            }
        }

        async function processStatusQueue() {
            const queue = [...statusQueue];
            statusQueue = [];
            statusTimer = null;

            if (queue.length === 0) return;

            // Group by roomId and status
            const groups = queue.reduce((acc, item) => {
                const key = `${item.roomIdEnc}_${item.status}`;
                if (!acc[key]) acc[key] = { roomIdEnc: item.roomIdEnc, status: item.status, ids: [] };
                acc[key].ids.push(item.idEnc);
                return acc;
            }, {});

            for (const key in groups) {
                const group = groups[key];
                try {
                    await fetch(`${API_BASE}/api/chat/status`, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            roomId: group.roomIdEnc,
                            status: group.status,
                            messageIdsEncrypted: group.ids
                        })
                    });
                } catch(e) {
                    console.error("Batch status update failed", e);
                }
            }
        }

        async function markMessageAsSeen(idEnc, roomIdEnc) {
            queueStatusUpdate(idEnc, roomIdEnc, "Seen");
        }

        async function markMessageAsDelivered(idEnc, roomIdEnc) {
            queueStatusUpdate(idEnc, roomIdEnc, "Delivered");
        }

        async function markRoomAsRead() {
            if (!activeRoomId) return;
            
            const badge = document.getElementById(`unread-${activeRoomId}`);
            if (badge) badge.classList.add("hidden");

            // Mark all unread messages in the current view as seen
            const unreadMessages = document.querySelectorAll(".message-received .status-icon:not(.seen)");
            // Actually, we can just call the bulk status update endpoint for the whole room
            try {
                await fetch(`${API_BASE}/api/chat/status`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        roomId: activeRoomId,
                        status: "Seen",
                        messageIdsEncrypted: [] // The backend should handle empty as "all in room" or we collect IDs
                    })
                });
            } catch(e) {}
        }

        // --- Start App ---
        if (token) initApp();
    </script>
</body>
</html>
