name: Build, publish and deploy to MonsterASP.NET

on: [push]

jobs:
  build_and_deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          
      - name: Install dependencies
        run: dotnet restore
        
      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./ReelsCommerceSystem.Api/ReelsCommerceSystem.Api.csproj --configuration Release --output ./publish --runtime win-x86

      - name: Test with .NET
        run: dotnet test

      name: Build, publish and deploy to MonsterASP.NET

on: [push]

jobs:
  build_and_deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          
      - name: Install dependencies
        run: dotnet restore
        
      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish --configuration Release --output ./publish --runtime win-x86

      - name: Deploy to  MonsterASP.NET via WebDeploy
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: site36480
          server-computer-name: https://site36480.siteasp.net:8172/msdeploy.axd
          server-username: site36480
          server-password: ${{ secrets.SERVER_PASSWORD }}
          source-path: ./publish

